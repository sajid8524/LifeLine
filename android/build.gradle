allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

def externalBuildRoot = System.getenv("LIFESAVER_DTN_BUILD_DIR")
rootProject.buildDir = externalBuildRoot ?: "../build"

subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}

subprojects {
    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
