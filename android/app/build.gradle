plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "org.lifesaver.dtn"
    compileSdk 36
    ndkVersion "28.2.13676358"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId "org.lifesaver.dtn"
        minSdkVersion flutter.minSdkVersion
        targetSdk 35
        versionCode 1
        versionName "0.2.0"
        manifestPlaceholders += [GOOGLE_MAPS_API_KEY: ""]
    }

    buildTypes {
        release {
            // Hackathon distribution only. Replace with a private upload key before Play Store release.
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source "../.."
}
